x-api-common: &api-common
  build:
    context: ./backend
    dockerfile: ../docker/api/Dockerfile
  env_file: .env
  volumes:
    - ./models:/models:ro
    - evidence:/data/evidence
    - reports:/data/reports
  depends_on:
    postgres:
      condition: service_healthy
    redis:
      condition: service_healthy
  restart: unless-stopped
  networks:
    - internal

x-worker-common: &worker-common
  build:
    context: ./backend
    dockerfile: ../docker/worker/Dockerfile
  env_file: .env
  volumes:
    - ./models:/models:ro
    - evidence:/data/evidence
    - reports:/data/reports
    - /var/run/docker.sock:/var/run/docker.sock:ro
  depends_on:
    postgres:
      condition: service_healthy
    redis:
      condition: service_healthy
  restart: unless-stopped
  networks:
    - internal
    - scan_net

services:
  # ─── Database ────────────────────────────────────────────────────────────────
  postgres:
    image: pgvector/pgvector:pg16
    environment:
      POSTGRES_USER: autopentest
      POSTGRES_PASSWORD: autopentest
      POSTGRES_DB: autopentest
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./docker/postgres/init.sql:/docker-entrypoint-initdb.d/init.sql:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U autopentest -d autopentest"]
      interval: 5s
      timeout: 5s
      retries: 10
    networks:
      - internal
    restart: unless-stopped

  # ─── Redis ───────────────────────────────────────────────────────────────────
  redis:
    image: redis:7.2-alpine
    command: redis-server --maxmemory 512mb --maxmemory-policy allkeys-lru
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 10
    networks:
      - internal
    restart: unless-stopped

  # ─── API ─────────────────────────────────────────────────────────────────────
  api:
    <<: *api-common
    command: uvicorn main:app --host 0.0.0.0 --port 8000 --workers 4
    ports:
      - "8000:8000"
    healthcheck:
      test: ["CMD-SHELL", "curl -f http://localhost:8000/health/ || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 15s

  # ─── Celery Workers ──────────────────────────────────────────────────────────
  worker-dast:
    <<: *worker-common
    command: celery -A core.celery_app worker -Q dast -c 4 --loglevel=info -n dast@%h

  worker-sast:
    <<: *worker-common
    command: celery -A core.celery_app worker -Q sast -c 2 --loglevel=info -n sast@%h

  worker-ai:
    <<: *worker-common
    command: celery -A core.celery_app worker -Q ai -c 1 --loglevel=info -n ai@%h
    volumes:
      - ./models:/models:ro
      - evidence:/data/evidence
      - reports:/data/reports
      - /var/run/docker.sock:/var/run/docker.sock:ro

  worker-report:
    <<: *worker-common
    command: celery -A core.celery_app worker -Q report -c 2 --loglevel=info -n report@%h

  # ─── Celery Beat (Scheduler) ─────────────────────────────────────────────────
  celery-beat:
    <<: *worker-common
    command: celery -A core.celery_app beat --loglevel=info --scheduler celery.beat:PersistentScheduler

  # ─── Frontend ────────────────────────────────────────────────────────────────
  frontend:
    build:
      context: ./frontend
      dockerfile: ../docker/frontend/Dockerfile
      args:
        NEXT_PUBLIC_API_URL: http://localhost:8000
    env_file: .env
    ports:
      - "3000:3000"
    depends_on:
      api:
        condition: service_healthy
    networks:
      - internal
    restart: unless-stopped

networks:
  internal:
    driver: bridge
  scan_net:
    name: autopentest_scan_net
    driver: bridge

volumes:
  postgres_data:
  redis_data:
  evidence:
  reports:
